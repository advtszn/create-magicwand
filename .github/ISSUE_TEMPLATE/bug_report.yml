name: Bug report
description: Report a bug in the CLI, templates, or website
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the command you ran and what you selected.
      placeholder: |
        1. Run ...
        2. Choose runtime ...
        3. Choose framework ...
        4. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: create-magicwand version
      placeholder: 0.0.4
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: macOS 15, Node 22, Bun 1.3.10
